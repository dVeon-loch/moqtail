services:
  relay:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      # BunnyCDN — API key for fetching Anycast IP and updating DNS
      BUNNY_APIKEY: "${BUNNY_APIKEY}"
      BUNNY_APP_ID: "${BUNNY_APP_ID}"
      BUNNY_ZONEID: "${BUNNY_ZONEID}"
      BUNNY_RECORDID: "${BUNNY_RECORDID}"
      DNS_SUBDOMAIN: "${DNS_SUBDOMAIN:-moqtail}"

      # TLS certificate (certbot)
      CERTBOT_DOMAIN: "${CERTBOT_DOMAIN}"
      CERTBOT_EMAIL: "${CERTBOT_EMAIL}"
      # CERTBOT_STAGING: "1"  # Remove for production

      # Relay settings
      RELAY_PORT: "${RELAY_PORT:-4433}"
      RELAY_HOST: "${RELAY_HOST:-::}"

      R2_ACCOUNT_ID: "${R2_ACCOUNT_ID}"
      R2_ACCESS_KEY_ID: "${R2_ACCESS_KEY_ID}"
      R2_SECRET_ACCESS_KEY: "${R2_SECRET_ACCESS_KEY}"
      R2_BUCKET_NAME: "${R2_BUCKET_NAME}"
      R2_PREFIX: "${R2_PREFIX:-moqtail}"
    ports:
      - "${RELAY_PORT:-4433}:${RELAY_PORT:-4433}/udp"
    cap_add:
      - NET_BIND_SERVICE
